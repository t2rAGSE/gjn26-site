:root{
  --bleu-capetien:#1B2A57; --rouge-plantagenet:#8F1B23;
  --or:#B8933E; --or-clair:#D8BE7E;
  --parchemin:#EFE3C8; --parchemin-dark:#DCC99C;
  --fond:#FBF9F4; --carte:#FFFFFF;
  --encre:#241C10; --encre-douce:#5B5142; --ligne:#E4DCC8;
  --vert-ok:#3F6B45; --rouge-err:#8F2D26;
  --ambre:#8A5A17; --ambre-fond:#FBEFD9;
  --radius:14px;
  --font-titre:'Engravers Old English','Pirata One',serif;
  --font-ui:'Libre Franklin',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --font-code:'IBM Plex Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--fond); font-family:var(--font-ui); color:var(--encre); min-height:100vh; -webkit-font-smoothing:antialiased;}
.bandeau{
  background:radial-gradient(ellipse at top left, rgba(255,255,255,.25), transparent 60%), linear-gradient(160deg, var(--parchemin) 0%, var(--parchemin-dark) 100%);
  border-bottom:3px solid var(--or); padding:18px 20px 22px; display:flex; align-items:center; gap:14px; position:relative; overflow:hidden;
}
.bandeau::after{ content:""; position:absolute; inset:0; background-image:repeating-linear-gradient(115deg, rgba(90,70,30,.035) 0 2px, transparent 2px 6px); pointer-events:none; }
.bandeau img{ width:52px; height:auto; flex-shrink:0; filter:drop-shadow(0 2px 3px rgba(0,0,0,.25)); position:relative; z-index:1; }
.bandeau .titres{ position:relative; z-index:1; }
.bandeau h1{ font-family:var(--font-titre); font-weight:normal; font-size:1.55rem; margin:0 0 2px; color:var(--encre); letter-spacing:.5px; }
.bandeau p{ margin:0; font-size:.72rem; text-transform:uppercase; letter-spacing:1.6px; color:var(--encre-douce); font-weight:600; }
#gjn26-indicateur-attente{
  display:none; max-width:480px; margin:12px auto 0; padding:9px 14px;
  background:var(--ambre-fond); color:var(--ambre); border:1px solid #E4C888; border-radius:10px;
  font-size:.8rem; font-weight:700; text-align:center;
}
#gjn26-indicateur-attente.visible{ display:block; }
main{ max-width:480px; margin:0 auto; padding:20px 16px 110px; }
.etape{ margin-bottom:18px; }
.etape label{ display:block; font-size:.72rem; text-transform:uppercase; letter-spacing:1.2px; font-weight:700; color:var(--encre-douce); margin-bottom:6px; }
.etape select, .etape input[type=number]{
  width:100%; padding:14px 16px; font-size:1rem; font-family:var(--font-ui); font-weight:600; color:var(--encre);
  background:var(--carte); border:1.5px solid var(--ligne); border-radius:10px;
  appearance:none; -webkit-appearance:none; transition:border-color .15s, box-shadow .15s, background-color .15s;
}
.etape select{
  padding-right:42px;
  background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="9"><path d="M1 1l6 6 6-6" stroke="%23B8933E" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>');
  background-repeat:no-repeat; background-position:right 16px center;
}
.etape select:disabled{ background-color:#F4F1E9; color:#B4AD9B; border-color:#EDE8DB; }
.etape select:not(:disabled):focus, .etape input:focus{ outline:none; border-color:var(--or); box-shadow:0 0 0 3px rgba(184,147,62,.18); }
.etape select:not(:disabled):hover, .etape input:hover{ border-color:var(--or-clair); }
.etape .aide{ font-size:.72rem; color:var(--encre-douce); margin-top:5px; }
.sceau-zone{ min-height:0; margin:22px 0; }
.sceau{
  display:none; align-items:center; gap:14px; background:var(--carte);
  border:1.5px solid var(--ligne); border-left:6px solid var(--camp-couleur, var(--or)); border-radius:var(--radius);
  padding:14px 16px; box-shadow:0 2px 10px rgba(36,28,16,.06); animation:apparition .35s ease;
}
.sceau.visible{ display:flex; }
@keyframes apparition{ from{opacity:0; transform:translateY(-6px);} to{opacity:1; transform:translateY(0);} }
.sceau-badge{
  width:46px; height:46px; border-radius:50%; background:var(--camp-couleur, var(--or)); color:#F4EBD6;
  display:flex; align-items:center; justify-content:center; font-family:var(--font-titre); font-size:1.15rem; flex-shrink:0;
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.25), 0 2px 4px rgba(0,0,0,.25);
}
.sceau-detail{ min-width:0; }
.sceau-detail .code{ font-family:var(--font-code); font-size:.95rem; font-weight:700; color:var(--camp-couleur, var(--encre)); letter-spacing:.5px; }
.sceau-detail .nom{ font-size:.92rem; color:var(--encre); margin-top:1px; }
.sceau-detail .origine{ font-size:.76rem; color:var(--encre-douce); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.toggle2{ display:flex; gap:10px; }
.toggle2 button{
  flex:1; padding:16px 8px; border-radius:10px; border:1.5px solid var(--ligne); background:var(--carte);
  font-family:var(--font-ui); font-weight:700; font-size:.95rem; color:var(--encre-douce); cursor:pointer; transition:all .15s;
}
.toggle2 button[data-val="1"].actif{ background:var(--vert-ok); border-color:var(--vert-ok); color:#fff; }
.toggle2 button[data-val="0"].actif{ background:var(--rouge-err); border-color:var(--rouge-err); color:#fff; }
.barre-action{ position:fixed; left:0; right:0; bottom:0; background:linear-gradient(0deg, var(--fond) 55%, rgba(251,249,244,0)); padding:22px 16px 18px; display:flex; justify-content:center; }
.btn-enregistrer{
  width:100%; max-width:448px; padding:16px; background:var(--bleu-capetien); color:#F4EBD6; border:none; border-radius:10px;
  font-family:var(--font-ui); font-weight:700; font-size:1rem; letter-spacing:.3px; cursor:pointer; box-shadow:0 3px 10px rgba(27,42,87,.35);
  transition:transform .1s, box-shadow .15s, opacity .15s;
}
.btn-enregistrer:disabled{ opacity:.4; cursor:not-allowed; box-shadow:none; }
.btn-enregistrer:not(:disabled):active{ transform:translateY(1px); }
.confirmation{
  display:none; position:fixed; left:16px; right:16px; bottom:96px; color:#fff; padding:12px 16px; border-radius:10px;
  font-size:.9rem; font-weight:600; text-align:center; box-shadow:0 4px 14px rgba(0,0,0,.2); animation:apparition .3s ease;
}
.confirmation.visible{ display:block; }
.confirmation.ok{ background:var(--vert-ok); }
.confirmation.attente{ background:var(--ambre); }
@media (prefers-reduced-motion: reduce){ .sceau, .confirmation{ animation:none; } }

/* ===== Navigation commune GJN26 ===== */
.gjn26-nav{
  position:sticky; top:0; z-index:100;
  background:var(--bleu-capetien);
  display:flex; align-items:center; gap:10px;
  padding:9px 14px;
  box-shadow:0 2px 6px rgba(0,0,0,.15);
}
.gjn26-nav-burger{
  background:none; border:none; color:#F4EBD6; font-size:1.3rem; line-height:1;
  cursor:pointer; padding:4px 6px; border-radius:6px; flex-shrink:0;
}
.gjn26-nav-burger:active{ background:rgba(255,255,255,.12); }
.gjn26-nav-titre{
  font-family:var(--font-titre); color:#F4EBD6; font-size:1.05rem; letter-spacing:.5px;
  flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.gjn26-nav-titre a{ color:inherit; text-decoration:none; }

.gjn26-nav-overlay{
  position:fixed; inset:0; background:rgba(20,14,4,.45); z-index:99;
  opacity:0; pointer-events:none; transition:opacity .2s ease;
}
.gjn26-nav-overlay.ouvert{ opacity:1; pointer-events:auto; }

.gjn26-nav-panel{
  position:fixed; top:0; left:0; bottom:0; width:82%; max-width:320px; z-index:101;
  background:var(--fond); box-shadow:3px 0 16px rgba(0,0,0,.25);
  transform:translateX(-100%); transition:transform .25s ease;
  display:flex; flex-direction:column; overflow-y:auto;
}
.gjn26-nav-panel.ouvert{ transform:translateX(0); }
.gjn26-nav-panel-header{
  background:linear-gradient(160deg, var(--parchemin) 0%, var(--parchemin-dark) 100%);
  border-bottom:3px solid var(--or);
  padding:16px 16px 14px; display:flex; align-items:center; gap:10px;
}

<script>/************************************************************
 * GJN26 — CONFIGURATION DES POINTS DE SOUMISSION
 *
 * À COMPLÉTER après avoir lancé creerFormulairesSaisie() dans Apps Script :
 * ouvrir l'onglet "Config_Formulaires" du Sheet GJN26 - Notation, et copier
 * pour chaque jeu l'URL formResponse + les entry.XXXXXXX affichés.
 *
 * Tant que ce fichier contient encore "REMPLACER", le site affiche un
 * avertissement au lieu d'essayer d'envoyer les données (voir saisie.js).
 ************************************************************/

    entryIds: {

<script>/************************************************************
 * GJN26 — SOUMISSION VERS GOOGLE FORMS + FILE D'ATTENTE HORS-LIGNE
 *
 * Principe (cf. décision "Option B") : le formulaire visuel custom du site
 * ne parle jamais à notre propre Apps Script pour l'ÉCRITURE des scores —
 * il poste directement vers l'endpoint natif de soumission d'un Google
 * Form (formResponse), pour profiter de l'infrastructure Google qui
 * encaisse nativement de forts pics de soumissions simultanées.
 *
 * Cet endpoint répond en mode "opaque" (no-cors) : on ne peut jamais lire
 * le code HTTP de retour. On ne peut détecter que les échecs RÉSEAU
 * (pas de signal / avion / DNS), pas les échecs de validation côté Forms.
 * D'où la file d'attente : si l'appareil est hors-ligne, la saisie est
 * conservée localement et renvoyée automatiquement dès que le réseau revient.
 ************************************************************/

const GJN26_QUEUE_KEY = 'gjn26_file_attente_v1';

/**
 * Envoie une saisie vers le Google Form correspondant.
 * @param {string} gameId - clé dans FORM_CONFIG (ex: 'ateliers')
 * @param {Object} donnees - { NomDuChamp: valeur, ... } — les clés doivent
 *        correspondre à celles définies dans FORM_CONFIG.entryIds
 * @param {boolean} [silencieux] - si true, ne modifie pas l'UI (utilisé par la purge de file)
 * @returns {Promise<boolean>} true si l'envoi réseau a réussi (pas de garantie d'écriture serveur)
 */
async function gjn26EnvoyerSaisie(gameId, donnees, silencieux) {
  const conf = (typeof FORM_CONFIG !== 'undefined') ? FORM_CONFIG[gameId] : null;

  if (!conf || !conf.actionUrl || conf.actionUrl.indexOf('REMPLACER') !== -1) {
    console.warn('[GJN26] form-config.js non complété pour "' + gameId + '" — saisie mise en file d\'attente locale, mais ne partira réellement qu\'une fois le formulaire configuré.');
    gjn26AjouterAFileAttente(gameId, donnees);
    if (!silencieux) gjn26MajIndicateurFileAttente();
    return false;
  }

  const body = new URLSearchParams();
  Object.keys(donnees).forEach(champ => {
    const entryId = conf.entryIds[champ];
    if (entryId) body.append(entryId, donnees[champ]);
  });

  try {
    await fetch(conf.actionUrl, { method: 'POST', mode: 'no-cors', body: body });
    return true; // pas de lecture de statut possible en no-cors : succès réseau supposé
  } catch (erreurReseau) {
    // Hors-ligne, DNS injoignable, etc. : on garde la saisie pour plus tard.
    gjn26AjouterAFileAttente(gameId, donnees);
    if (!silencieux) gjn26MajIndicateurFileAttente();
    return false;
  }
}

function gjn26AjouterAFileAttente(gameId, donnees) {
  const file = gjn26LireFileAttente();
  file.push({ gameId: gameId, donnees: donnees, horodatage: new Date().toISOString() });
  localStorage.setItem(GJN26_QUEUE_KEY, JSON.stringify(file));
}

function gjn26LireFileAttente() {
  try {
    return JSON.parse(localStorage.getItem(GJN26_QUEUE_KEY) || '[]');
  } catch (e) {
    return [];
  }
}

/**
 * Tente de renvoyer toutes les saisies en attente (à appeler au chargement
 * de la page et sur l'évènement 'online').
 */
async function gjn26ViderFileAttente() {
  let file = gjn26LireFileAttente();
  if (file.length === 0) { gjn26MajIndicateurFileAttente(); return; }

  const restant = [];
  for (const item of file) {
    const ok = await gjn26EnvoyerSaisie(item.gameId, item.donnees, true);
    if (!ok) restant.push(item);
  }
  localStorage.setItem(GJN26_QUEUE_KEY, JSON.stringify(restant));
  gjn26MajIndicateurFileAttente();
}

/**
 * Met à jour un badge visuel "N envois en attente" si l'élément
 * #gjn26-indicateur-attente existe sur la page.
 */
function gjn26MajIndicateurFileAttente() {
  const n = gjn26LireFileAttente().length;
  const el = document.getElementById('gjn26-indicateur-attente');
  if (!el) return;
  if (n === 0) {
    el.classList.remove('visible');
  } else {
    el.textContent = n === 1
      ? '1 envoi en attente de réseau'
      : n + ' envois en attente de réseau';
    el.classList.add('visible');
  }
}

selVille.addEventListener('change', () => {
  const camp = selCamp.value, province = selProvince.value, ville = selVille.value; resetSceau();
  if(!ville){ selPatrouille.disabled = true; remplir(selPatrouille, [], '— Choisir la ville d\'abord —'); majBouton(); return; }
  const pats = PATROUILLES.filter(p=>p.camp===camp && p.province===province && p.ville===ville);
  selPatrouille.innerHTML = '<option value="">— Choisir —</option>' + pats.map((p,i) => `<option value="${i}">${p.code} — ${p.totem} (${p.origine})</option>`).join('');
  selPatrouille.dataset.pats = JSON.stringify(pats);
  selPatrouille.disabled = false; majBouton();
});
selPatrouille.addEventListener('change', () => {
  const idx = selPatrouille.value;
  if(idx === ''){ resetSceau(); cleSelectionnee = null; majBouton(); return; }
  const pats = JSON.parse(selPatrouille.dataset.pats || '[]');
  const p = pats[idx];
  cleSelectionnee = [p.camp, p.province, p.ville, p.code].join('|');
  afficherSceau(p); majBouton();
});
function afficherSceau(p){
  const couleur = COULEUR_CAMP[p.camp] || 'var(--or)';
  sceau.style.setProperty('--camp-couleur', couleur);
  sceauBadge.textContent = p.code.replace(/[0-9]/g,'').slice(0,2).toUpperCase();
  sceauCode.textContent = p.code + ' · ' + p.totem;
  sceauNom.textContent = p.camp + ' — ' + p.province + ' / ' + p.ville;
  sceauOrigine.textContent = p.origine;
  sceau.classList.add('visible');
}
function resetSceau(){ sceau.classList.remove('visible'); }


const formationOui = document.getElementById('formation-oui');
const formationNon = document.getElementById('formation-non');
let formationValeur = null;
formationOui.addEventListener('click', () => { formationValeur = 1; formationOui.classList.add('actif'); formationNon.classList.remove('actif'); majBouton(); });
formationNon.addEventListener('click', () => { formationValeur = 0; formationNon.classList.add('actif'); formationOui.classList.remove('actif'); majBouton(); });
const brinsLaine = document.getElementById('brinsLaine');


function majBouton(){
  btnSubmit.disabled = !(cleSelectionnee !== null && (formationValeur !== null && brinsLaine.value !== '' && Number(brinsLaine.value) >= 0 && Number(brinsLaine.value) <= 20));
}
brinsLaine.addEventListener('input', majBouton);


const btnSubmit = document.getElementById('btn-submit');
const confirmation = document.getElementById('confirmation');

btnSubmit.addEventListener('click', async () => {
  btnSubmit.disabled = true;
  const donnees = {
    "CléPatrouille": cleSelectionnee,
      "FormationConservee": String(formationValeur),
      "BrinsLaineRestants": brinsLaine.value,
  };
  const envoiReussi = await gjn26EnvoyerSaisie('combatfinal', donnees);
  confirmation.className = 'confirmation visible ' + (envoiReussi ? 'ok' : 'attente');
  confirmation.textContent = envoiReussi ? 'Score envoyé ✓' : 'Pas de réseau — score gardé en attente, sera envoyé automatiquement';
  setTimeout(() => {
    confirmation.classList.remove('visible');
    selPatrouille.value = ''; resetSceau(); cleSelectionnee = null;
    formationValeur = null; formationOui.classList.remove('actif'); formationNon.classList.remove('actif');
brinsLaine.value = '';

    majBouton();
  }, 2000);
});
majBouton();
</script>
<script>

document.getElementById('gjn26-nav-burger').addEventListener('click', () => {
  document.getElementById('gjn26-nav-panel').classList.add('ouvert');
  document.getElementById('gjn26-nav-overlay').classList.add('ouvert');
});
function gjn26FermerNav(){
  document.getElementById('gjn26-nav-panel').classList.remove('ouvert');
  document.getElementById('gjn26-nav-overlay').classList.remove('ouvert');
}
document.getElementById('gjn26-nav-close').addEventListener('click', gjn26FermerNav);
document.getElementById('gjn26-nav-overlay').addEventListener('click', gjn26FermerNav);

</script>
